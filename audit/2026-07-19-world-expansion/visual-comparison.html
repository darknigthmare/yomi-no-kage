<!doctype html>
<html lang="fr">
<meta charset="utf-8">
<title>Yomi no Kage — comparaison de cohérence</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    padding: 24px;
    background: #080a10;
    color: #f1dfbd;
    font: 700 15px/1.35 system-ui, sans-serif;
  }
  h1 { margin: 0 0 18px; font-size: 20px; letter-spacing: .08em; }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  figure {
    margin: 0;
    padding: 12px;
    border: 1px solid #6d5d45;
    background: #11141c;
  }
  figcaption { margin-bottom: 10px; color: #d29b63; }
  img {
    display: block;
    width: 100%;
    height: 620px;
    object-fit: contain;
    object-position: center;
    background: #05060a;
    image-rendering: pixelated;
  }
</style>
<h1>COHÉRENCE DU PLAN 2D — AVANT / APRÈS</h1>
<main>
  <figure>
    <figcaption>AVANT — bâtiments isolés et lecture de profondeur cassée</figcaption>
    <img src="reference-before.png" alt="Capture de référence avant correction">
  </figure>
  <figure>
    <figcaption>APRÈS — mur continu, tour frontale, props ancrés et plans hiérarchisés</figcaption>
    <img src="11-front-tower-fire-runtime.png" alt="Capture après correction">
  </figure>
</main>
</html>
